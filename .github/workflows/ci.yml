name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('config/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        # requirements-dev pulls in runtime deps via -r, plus pytest.
        # Runtime requirements.txt alone has no test runner — installing
        # only it makes this job fail at 'pytest: command not found'.
        run: pip install -r config/requirements-dev.txt

      - name: Gateway bypass lint
        run: bash scripts/lint_imports.sh

      - name: Run tests
        # Test env (ENGRAM_USER_ID, AUDIT_HMAC_SECRET, ENGRAM_API_KEY) is owned
        # by tests/conftest.py via setdefault. Do NOT set them here — real env
        # vars win over setdefault, and tests assert on conftest's exact values.
        run: pytest tests/ -v --tb=short
