server {
    listen 8501;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy: all /api/* to the FastAPI brain
    location /api/ {
        proxy_pass         http://ai_os_api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy: /chat  (SSE streaming — buffering disabled so tokens flow immediately)
    location = /chat {
        proxy_pass             http://ai_os_api:8000/chat;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_read_timeout     120s;
    }

    # Proxy: /ingest
    location = /ingest {
        proxy_pass         http://ai_os_api:8000/ingest;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy: /run-agents/*
    location /run-agents/ {
        proxy_pass         http://ai_os_api:8000/run-agents/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy: /search
    location = /search {
        proxy_pass         http://ai_os_api:8000/search;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy: /v1/* (OpenAI-compatible API — chat completions + embeddings)
    location /v1/ {
        proxy_pass         http://ai_os_api:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # Proxy: /mcp/* (SSE transport — buffering off, Connection keep-alive)
    location /mcp/ {
        proxy_pass             http://ai_os_api:8000/mcp/;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       Connection        '';
        proxy_buffering        off;
        proxy_read_timeout     300s;
    }

    # SPA fallback — any unmatched route serves index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
