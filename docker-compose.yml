version: '3.8'

services:
  # 1. The Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_os_vault
    restart: unless-stopped
    oom_score_adj: -500
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_os_net
    healthcheck:
      # Qdrant's image has no curl — use bash's built-in TCP device instead.
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # 2. The API
  os_layer:
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: ai_os_api
    restart: unless-stopped
    oom_score_adj: -300
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    command: uvicorn core.brain:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./core:/app/core
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./data:/app/data
      - ./credentials:/app/credentials:ro
      - audit_socket:/tmp/audit        # IPC socket to audit_writer
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENGRAM_USER_ID=${ENGRAM_USER_ID}
      - ENGRAM_ENCRYPTION_KEY=${ENGRAM_ENCRYPTION_KEY}
      - AUDIT_SOCKET_PATH=/tmp/audit/audit.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      audit_writer:
        condition: service_healthy
    networks:
      - ai_os_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 3. The Dashboard (UI)
  dashboard:
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: ai_os_dashboard
    restart: unless-stopped
    oom_score_adj: 500
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    command: streamlit run interface/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./interface:/app/interface
      - ./core:/app/core:ro
      - ./agents:/app/agents:ro
      - ./data/dbs:/app/data/dbs:ro
      - ./screenshots:/app/screenshots:ro
    environment:
      - ENGRAM_USER_ID=${ENGRAM_USER_ID}
      - AUDIT_HMAC_SECRET=${AUDIT_HMAC_SECRET}
      - ENGRAM_API_KEY=${ENGRAM_API_KEY}
      - BRAIN_API_URL=http://ai_os_api:8000
      - PYTHONPATH=/app
    depends_on:
      os_layer:
        condition: service_healthy
    networks:
      - ai_os_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 4. The Audit Writer (sole owner of tamper-evident audit log)
  audit_writer:
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: engram_audit
    restart: unless-stopped
    # Runs as engram (uid 1001) — same as all other services. Volume mountpoints
    # (/audit, /tmp/audit) are pre-created with engram ownership in the Dockerfile
    # so Docker initialises the named volumes with the correct permissions.
    oom_score_adj: 0
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command: python audit_writer/server.py
    volumes:
      - audit_data:/audit              # sole R/W mount — no other service gets this
      - audit_socket:/tmp/audit        # shared socket directory for IPC
      - ./audit_writer:/app/audit_writer:ro
      - ./agents:/app/agents:ro
      - ./core:/app/core:ro
    environment:
      - AUDIT_HMAC_SECRET=${AUDIT_HMAC_SECRET}
      - AUDIT_DB_PATH=/audit/audit.db
      # AUDIT_SOCKET_PATH is intentionally NOT set here — this process writes directly.
    networks:
      - ai_os_net
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/audit/audit.sock"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  qdrant_data:
  audit_data:    # tamper-evident audit DB — only audit_writer mounts this
  audit_socket:  # Unix socket directory shared for IPC between audit_writer and clients

networks:
  ai_os_net:
    driver: bridge