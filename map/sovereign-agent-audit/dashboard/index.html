<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engram Sovereign Agent Audit</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --ink: #181816;
      --muted: #64645d;
      --line: #d9d8d0;
      --panel: #ffffff;
      --accent: #0f766e;
      --warn: #b45309;
      --high: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.86);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(10px);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { font-size: 22px; line-height: 1.2; margin: 0; letter-spacing: 0; }
    .sub { color: var(--muted); margin-top: 4px; }
    .proof {
      display: grid;
      gap: 4px;
      text-align: right;
      min-width: 280px;
    }
    .hash {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
      color: var(--accent);
      font-size: 12px;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 22px 18px 40px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric { padding: 16px; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; align-items: start; }
    .panel h2 { font-size: 15px; margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    pre {
      white-space: pre-wrap;
      margin: 0;
      padding: 16px;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .events { padding: 8px 12px 12px; }
    .event {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 10px;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
    }
    .event:last-child { border-bottom: 0; }
    .agent { font-weight: 700; }
    .action { color: var(--muted); }
    .elapsed { color: var(--muted); font-variant-numeric: tabular-nums; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    @media (max-width: 760px) {
      .top, .grid { display: block; }
      .proof { text-align: left; margin-top: 12px; }
      .metrics { grid-template-columns: 1fr; }
      .event { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>Engram Sovereign Agent Audit</h1>
        <div class="sub">Planner, Redactor, and Auditor activity from the latest local run.</div>
      </div>
      <div class="proof">
        <button id="verify">Verify proof hash</button>
        <div class="hash" id="proofHash">Waiting for audit output...</div>
      </div>
    </div>
  </header>
  <main>
    <section class="metrics">
      <div class="metric"><div class="label">Documents</div><div class="value" id="docCount">0</div></div>
      <div class="metric"><div class="label">Findings</div><div class="value" id="findingCount">0</div></div>
      <div class="metric"><div class="label">PII Redactions</div><div class="value" id="piiCount">0</div></div>
    </section>
    <section class="grid">
      <div class="panel">
        <h2>Redacted Summary</h2>
        <pre id="summary">Run ./run_audit.sh after adding PDFs to input/.</pre>
      </div>
      <div class="panel">
        <h2>Agent Activity Log</h2>
        <div class="events" id="events"></div>
      </div>
    </section>
  </main>
  <script>
    const statusPath = "../outputs/latest/status.json";

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", data);
      return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function loadStatus() {
      const res = await fetch(statusPath, { cache: "no-store" });
      if (!res.ok) throw new Error("No status yet");
      const data = await res.json();
      document.getElementById("docCount").textContent = data.document_count || 0;
      document.getElementById("findingCount").textContent = data.finding_count || 0;
      document.getElementById("piiCount").textContent = data.pii_redaction_count || 0;
      document.getElementById("summary").textContent = data.summary || "";
      document.getElementById("proofHash").textContent = data.proof?.hash || "No proof generated";
      const events = document.getElementById("events");
      events.innerHTML = "";
      (data.events || []).forEach(event => {
        const row = document.createElement("div");
        row.className = "event";
        row.innerHTML = `<div class="agent">${event.agent}</div><div><strong>${event.action}</strong><div class="action">${event.detail}</div></div><div class="elapsed">${event.elapsed_ms}ms</div>`;
        events.appendChild(row);
      });
    }

    document.getElementById("verify").addEventListener("click", async () => {
      const [logRes, proofRes] = await Promise.all([
        fetch("../outputs/latest/audit_log.jsonl", { cache: "no-store" }),
        fetch("../outputs/latest/proof.json", { cache: "no-store" })
      ]);
      const log = await logRes.text();
      const proof = await proofRes.json();
      const actual = await sha256(log);
      alert(actual === proof.hash ? "Proof hash verified against audit_log.jsonl" : "Proof mismatch");
    });

    loadStatus().catch(() => {});
    setInterval(() => loadStatus().catch(() => {}), 3000);
  </script>
</body>
</html>
